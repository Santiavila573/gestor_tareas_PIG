<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a89aff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Task List Icon -->
  <g fill="white" opacity="0.95">
    <!-- Top checkmark -->
    <circle cx="10" cy="10" r="1.5"/>
    <path d="M 9 10 L 10 11 L 12 9" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="14" y="9.5" width="10" height="1.5" rx="0.5"/>
    
    <!-- Middle checkmark -->
    <circle cx="10" cy="16" r="1.5"/>
    <path d="M 9 16 L 10 17 L 12 15" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="14" y="15.5" width="8" height="1.5" rx="0.5"/>
    
    <!-- Bottom checkmark -->
    <circle cx="10" cy="22" r="1.5"/>
    <path d="M 9 22 L 10 23 L 12 21" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="14" y="21.5" width="6" height="1.5" rx="0.5"/>
  </g>
  
  <!-- AI Sparkle -->
  <g fill="#ffd700" opacity="0.9">
    <circle cx="25" cy="7" r="1.5"/>
    <path d="M 25 4 L 25 10 M 22 7 L 28 7" stroke="#ffd700" stroke-width="1" opacity="0.8"/>
  </g>
</svg>
