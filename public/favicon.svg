<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9381f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a89aff;stop-opacity:1" />
    </linearGradient>
    
    <!-- AI Neural Pattern -->
    <pattern id="neuralPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="white" opacity="0.1"/>
      <circle cx="25" cy="15" r="1" fill="white" opacity="0.1"/>
      <circle cx="15" cy="30" r="1" fill="white" opacity="0.1"/>
      <line x1="5" y1="5" x2="25" y2="15" stroke="white" stroke-width="0.5" opacity="0.05"/>
      <line x1="25" y1="15" x2="15" y2="30" stroke="white" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Neural network pattern overlay -->
  <rect width="512" height="512" rx="100" fill="url(#neuralPattern)"/>
  
  <!-- Main Task List Container -->
  <g transform="translate(100, 120)">
    <!-- Task 1 - Completed -->
    <g>
      <!-- Checkbox background -->
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white" opacity="0.95"/>
      <!-- Checkmark -->
      <path d="M 15 30 L 25 42 L 45 18" stroke="#7b68ee" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Task line -->
      <rect x="80" y="20" width="220" height="20" rx="10" fill="white" opacity="0.9"/>
    </g>
    
    <!-- Task 2 - Completed -->
    <g transform="translate(0, 100)">
      <!-- Checkbox background -->
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white" opacity="0.95"/>
      <!-- Checkmark -->
      <path d="M 15 30 L 25 42 L 45 18" stroke="#7b68ee" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Task line -->
      <rect x="80" y="20" width="180" height="20" rx="10" fill="white" opacity="0.85"/>
    </g>
    
    <!-- Task 3 - In Progress -->
    <g transform="translate(0, 200)">
      <!-- Checkbox background -->
      <rect x="0" y="0" width="60" height="60" rx="12" fill="white" opacity="0.95"/>
      <!-- Partial checkmark -->
      <path d="M 15 30 L 25 42" stroke="#a89aff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      <!-- Task line -->
      <rect x="80" y="20" width="140" height="20" rx="10" fill="white" opacity="0.75"/>
    </g>
  </g>
  
  <!-- AI Sparkle/Star - Top Right -->
  <g transform="translate(400, 80)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="35" fill="#ffd700" opacity="0.2"/>
    <circle cx="0" cy="0" r="25" fill="#ffd700" opacity="0.3"/>
    <!-- Main star -->
    <circle cx="0" cy="0" r="18" fill="#ffd700"/>
    <!-- Star rays -->
    <path d="M 0 -30 L 0 30 M -30 0 L 30 0" stroke="#ffd700" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <path d="M -21 -21 L 21 21 M 21 -21 L -21 21" stroke="#ffd700" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Center highlight -->
    <circle cx="-5" cy="-5" r="6" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Subtle shadow effect -->
  <ellipse cx="256" cy="480" rx="200" ry="20" fill="black" opacity="0.1"/>
</svg>
